name: CI
on:
  push:
    branches:
      - main
  pull_request:

env:
  CI: true

permissions:
  contents: write # to create release (changesets/action)
  id-token: write # required for provenance and OIDC publish
  pull-requests: write # to create pull request (changesets/action)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Build
        run: |
          pnpm install
          pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Knip
        run: pnpm knip

      # Temporary until setup-node action comes with npm version that contains
      # OIDC setup by default
      - name: Update npm
        if: github.repository == 'birchill/normal-jp' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm update -g npm

      - name: Create/update pull request or publish
        if: github.repository == 'birchill/normal-jp' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: changesets/action@v1
        with:
          commit: 'chore(release): publish'
          title: 'Publish next version'
          publish: pnpm ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
